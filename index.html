<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->

<!--  <base href="/">-->
  <base href="/">
  <script>
    document.addEventListener('DOMContentLoaded', () {
      // Handle redirect before Flutter loads
      const urlParams = new URLSearchParams(window.location.search);
      const redirectParam = urlParams.get('redirect');

      if (redirectParam) {
        const decodedPath = decodeURIComponent(redirectParam);
        // Clean URL before Flutter initializes
        window.history.replaceState({}, '', decodedPath);
      }

      // Initialize Flutter after URL cleanup
      setTimeout(() => {
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        document.body.appendChild(script);
      }, 50);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/url-polyfill@1.1.12/url-polyfill.min.js"></script>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Muhammad Essam Portfolio">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Muhammad Essam Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Muhammad Essam</title>
  <link rel="manifest" href="manifest.json">
<!--  <base href="/">-->
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    document.addEventListener('DOMContentLoaded', () {
      // Handle production redirects
      const redirectPath = sessionStorage.getItem('redirect_path');
      if (redirectPath) {
        window.history.replaceState({}, '', redirectPath);
        sessionStorage.removeItem('redirect_path');
      }

      // Initialize Flutter after URL cleanup
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
